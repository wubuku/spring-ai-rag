# ============================================
# Spring AI RAG — Multi-Model Demo Configuration
# ============================================
# Usage:
#   1. Copy .env.example to .env and fill in real API keys
#   2. mvn spring-boot:run -pl demos/demo-multi-model
#   3. curl http://localhost:8080/demo/models
# ============================================

server:
  port: 8080

spring:
  application:
    name: spring-ai-rag-multi-model-demo

  # PostgreSQL configuration
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai_rag_dev}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # Flyway database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # OpenAI-compatible configuration (DeepSeek / SiliconFlow, etc.)
  # To switch provider: modify app.llm.provider
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        enabled: false   # ChatModel beans are manually created by SpringAiConfig
        options:
          model: ${OPENAI_MODEL:deepseek-chat}
          temperature: 0.7
          maxTokens: 8192

# ============================================
# Spring AI RAG Core Configuration
# ============================================
app:
  # Default LLM provider: openai | anthropic | minimax
  # At runtime, switch dynamically via /demo/chat?provider=xxx
  llm:
    provider: ${LLM_PROVIDER:openai}

  # Vector embedding configuration (SiliconFlow BGE-M3)
  embedding:
    provider: siliconflow
    siliconflow:
      api-key: ${SILICONFLOW_API_KEY:dummy}
      base-url: https://api.siliconflow.cn/v1
      model: BAAI/bge-m3
      dimension: 1024

  # RAG retrieval configuration
  retrieval:
    defaultTopK: 5
    rerank:
      enabled: true
      topN: 3
    hybrid:
      vectorWeight: 0.7
      fulltextWeight: 0.3
      minScore: 0.3

# ============================================
# Actuator Health Checks
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ============================================
# Logging Configuration
# ============================================
logging:
  level:
    com.springairag: DEBUG
    org.springframework.ai: INFO
