server:
  port: 8080

# ============================================
# RAG 服务配置
# ============================================
general:
  rag:
    enabled: true
    memory:
      enabled: true
      max-messages: 20

# ============================================
# Spring AI 配置（LLM 提供商）
# ============================================
spring:
  ai:
    openai:
      # DeepSeek（OpenAI 兼容接口）
      api-key: ${DEEPSEEK_API_KEY:sk-your-key-here}
      base-url: https://api.deepseek.com/v1
      chat:
        enabled: true
        options:
          model: deepseek-chat

    # Anthropic（可选，取消注释切换）
    # anthropic:
    #   api-key: ${ANTHROPIC_API_KEY}
    #   chat:
    #     options:
    #       model: claude-sonnet-4-20250514

  # ============================================
  # 数据库配置
  # ============================================
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ai_rag_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10

  # Flyway 自动迁移
  flyway:
    enabled: true
    locations: classpath:db/migration

# ============================================
# 嵌入模型（SiliconFlow BGE-M3）
# ============================================
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:sk-your-key-here}
  base-url: https://api.siliconflow.cn/v1
  embedding:
    model: BAAI/bge-m3

# ============================================
# LLM 提供商切换
# ============================================
app:
  llm:
    provider: openai  # 可选: openai | anthropic

# ============================================
# Actuator 监控
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

# ============================================
# 日志
# ============================================
logging:
  level:
    com.springairag: DEBUG
    org.springframework.ai: INFO
