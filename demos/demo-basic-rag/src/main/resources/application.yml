# ============================================
# Demo-basic-rag：独立 Spring Boot 应用配置
# 使用 .env 中的真实 key 和数据库连接
# ============================================

spring:
  application:
    name: customer-service-bot

  main:
    allow-bean-definition-overriding: true

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:spring_ai_rag_dev}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: false   # V1-V10 已手动执行，无需重复迁移

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:}
      chat:
        options:
          model: ${OPENAI_MODEL:}
          temperature: 0.7

app:
  llm:
    provider: ${LLM_PROVIDER:openai}

siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  embedding:
    model: ${SILICONFLOW_MODEL:BAAI/bge-m3}
    dimensions: ${SILICONFLOW_DIMENSIONS:1024}

rag:
  retrieval:
    fulltext-enabled: true
    fulltext-strategy: auto
    vector-weight: 0.5
    fulltext-weight: 0.5
    default-limit: 10
    min-score: 0.3
  chat-memory:
    table-name: spring_ai_chat_memory
    history-size: 100
  security:
    api-key:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.springairag: DEBUG
    org.springframework.ai: INFO
