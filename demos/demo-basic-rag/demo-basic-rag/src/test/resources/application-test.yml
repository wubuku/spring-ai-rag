spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai_rag_dev}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123456}
  autoconfigure:
    exclude:
      - com.springairag.starter.GeneralRagAutoConfiguration

# Disable SpringAiConfig from creating real ChatModel (test uses MockAiConfig)
app.llm.provider: none
