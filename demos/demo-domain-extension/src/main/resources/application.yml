# ============================================================
# Domain Extension Example — Medical Consultation
# ============================================================

server:
  port: 8081

spring:
  # DataSource (PostgreSQL + pgvector)
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ai_rag_dev
    username: postgres
    password: postgres

  # Flyway auto-migration
  flyway:
    enabled: true
    locations: classpath:db/migration

  # AI model configuration (OpenAI-compatible, e.g. DeepSeek)
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:sk-xxx}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

# ============================================================
# Spring AI RAG Configuration
# ============================================================
app:
  llm:
    provider: openai
  siliconflow:
    api-key: ${SILICONFLOW_API_KEY:sk-xxx}
    embedding:
      model: BAAI/bge-m3
      dimensions: 1024

rag:
  memory:
    max-messages: 20

# ============================================================
# Monitoring Configuration
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
