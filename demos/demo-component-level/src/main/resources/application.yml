server:
  port: 8081

spring:
  application:
    name: component-level-rag-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ai_rag_dev
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Manually manage Flyway (not via Starter auto-configuration)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ================================================================
# LLM Configuration (required)
# ================================================================
app:
  llm:
    provider: openai
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

# ================================================================
# Embedding Model (SiliconFlow)
# ================================================================
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:your-siliconflow-key}
  embedding:
    model: BAAI/bge-m3
    dimensions: 1024

# ================================================================
# RAG Configuration
# ================================================================
rag:
  retrieval:
    fulltext-enabled: true
    fulltext-strategy: auto
    vector-weight: 0.5
    fulltext-weight: 0.5
    default-limit: 10
    min-score: 0.3
  chat-memory:
    table-name: spring_ai_chat_memory
    history-size: 100

logging:
  level:
    com.springairag: DEBUG
