server:
  port: 8081

spring:
  application:
    name: component-level-rag-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_ai_rag_dev
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # 手动管理 Flyway（不走 Starter 自动配置）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ================================================================
# LLM 配置（必需）
# ================================================================
app:
  llm:
    provider: openai
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
      base-url: https://api.deepseek.com/v1
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

# ================================================================
# 嵌入模型（SiliconFlow）
# ================================================================
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:your-siliconflow-key}
  embedding:
    model: BAAI/bge-m3
    dimensions: 1024

# ================================================================
# RAG 配置
# ================================================================
rag:
  retrieval:
    fulltext-enabled: true
    fulltext-strategy: auto
    vector-weight: 0.5
    fulltext-weight: 0.5
    default-limit: 10
    min-score: 0.3
  chat-memory:
    table-name: spring_ai_chat_memory
    history-size: 100

logging:
  level:
    com.springairag: DEBUG
