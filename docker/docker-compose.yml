# ============================================
# Spring AI RAG - docker-compose
# PostgreSQL + pgvector + RAG service
# ============================================

services:
  # PostgreSQL + pgvector vector database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: spring-ai-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spring_ai_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring AI RAG service
  rag-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: spring-ai-rag-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Database connection
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DB:-spring_ai_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # LLM configuration (DeepSeek example, modify as needed)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-sk-your-key-here}
      # General OpenAI-compatible configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${DEEPSEEK_API_KEY:-sk-your-key-here}}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
      # Embedding model (SiliconFlow BGE-M3)
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-sk-your-key-here}

volumes:
  pgdata:
