{{/*
Secret: sensitive credentials.
All values are base64-encoded by Helm at render time.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spring-ai-rag.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-ai-rag.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Spring profile ────────────────────────────────────────────────────────
  {{- if .Values.secrets.springProfile }}
  SPRING_PROFILES_ACTIVE: {{ .Values.secrets.springProfile | quote }}
  {{- end }}

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  POSTGRES_HOST:     {{ .Values.secrets.postgresHost | quote }}
  POSTGRES_PORT:     {{ .Values.secrets.postgresPort | quote }}
  POSTGRES_DATABASE: {{ .Values.secrets.postgresDatabase | quote }}
  POSTGRES_USER:     {{ .Values.secrets.postgresUsername | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}

  # ── DeepSeek / OpenAI-compatible LLM ─────────────────────────────────────
  DEEPSEEK_API_KEY: {{ required "secrets.deepseekApiKey is required" .Values.secrets.deepseekApiKey | quote }}
  OPENAI_API_KEY:   {{ default .Values.secrets.deepseekApiKey .Values.secrets.openaiApiKey | quote }}
  OPENAI_BASE_URL:   {{ .Values.secrets.openaiBaseUrl | quote }}
  OPENAI_MODEL:      {{ .Values.secrets.openaiModel | quote }}

  # ── SiliconFlow embedding ────────────────────────────────────────────────
  SILICONFLOW_API_KEY: {{ required "secrets.siliconflowApiKey is required" .Values.secrets.siliconflowApiKey | quote }}

  # ── Anthropic (optional) ──────────────────────────────────────────────────
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}

  # ── MiniMax (optional) ────────────────────────────────────────────────────
  {{- if and .Values.secrets.minimaxApiKey .Values.secrets.minimaxApiKeyId }}
  MINIMAX_API_KEY:  {{ .Values.secrets.minimaxApiKey | quote }}
  MINIMAX_API_KEY_ID: {{ .Values.secrets.minimaxApiKeyId | quote }}
  MINIMAX_BASE_URL: {{ .Values.secrets.minimaxBaseUrl | quote }}
  {{- end }}
