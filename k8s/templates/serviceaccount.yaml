{{/*
ServiceAccount: dedicated identity for the RAG service pods.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "spring-ai-rag.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-ai-rag.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
