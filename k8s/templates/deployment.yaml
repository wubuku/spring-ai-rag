{{/*
Deployment: Spring AI RAG service.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spring-ai-rag.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-ai-rag.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "spring-ai-rag.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0       # zero-downtime rolling update
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "spring-ai-rag.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "spring-ai-rag.labels" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Force restart when image changes (checksum of env vars)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret:  {{ include (print $.Template.BasePath "/secret.yaml")  . | sha256sum }}
    spec:
      serviceAccountName: {{ include "spring-ai-rag.serviceAccountName" . }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── Init container: wait for DB ──────────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at $POSTGRES_HOST:$POSTGRES_PORT..."
              until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER; do
                echo "PostgreSQL is unavailable - sleeping"
                sleep 5
              done
              echo "PostgreSQL is up - continuing"
          envFrom:
            - secretRef:
                name: {{ include "spring-ai-rag.fullname" . }}-env
                optional: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Environment from Secret ─────────────────────────────────────────
          envFrom:
            - secretRef:
                name: {{ include "spring-ai-rag.fullname" . }}-env
                optional: true    # gracefully handle cases where secret is managed externally
            - configMapRef:
                name: {{ include "spring-ai-rag.fullname" . }}-config
                optional: true

          # ── JVM options ────────────────────────────────────────────────────
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx{{ include "spring-ai-rag.jvm-heap" . }} -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
            - name: SERVER_PORT
              value: "8080"

          # ── Health probes ──────────────────────────────────────────────────
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # ── Resources ──────────────────────────────────────────────────────
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # ── Volume mounts ─────────────────────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /logs

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ── Graceful termination ─────────────────────────────────────────────
      terminationGracePeriodSeconds: 60
