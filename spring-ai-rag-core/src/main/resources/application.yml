# ============================================
# Spring AI RAG 服务配置
# ============================================

spring:
  # 加载项目根目录的 .env 文件（Spring Boot 3.x）
  config.import: optional:file:./.env
  application:
    name: spring-ai-rag

  # 允许 Bean 定义覆盖（自定义配置 Bean 覆盖自动配置）
  main:
    allow-bean-definition-overriding: true

  # 排除不需要的自动配置
  # PgVectorStore：由 VectorStoreConfig 手动创建 Bean
  # MiniMax Chat/Embedding：由 SpringAiConfig / EmbeddingModelConfig 手动管理（避免与 SiliconFlow 冲突）
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxChatAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxEmbeddingAutoConfiguration

  # 数据源 + HikariCP 连接池优化
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:spring_ai_rag_dev}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000         # 空闲连接 5 分钟回收
      max-lifetime: 1800000        # 连接最大存活 30 分钟
      connection-timeout: 10000    # 获取连接超时 10 秒
      leak-detection-threshold: 60000  # 连接泄漏检测 60 秒
      pool-name: rag-hikari

  # JPA / Hibernate 配置（Flyway 管理表结构，Hibernate 不修改 DDL）
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Spring AI OpenAI / OpenAI 兼容模型配置
  # DeepSeek 示例：base-url=https://api.deepseek.com/v1, model=deepseek-chat
  # 智谱示例：base-url=https://open.bigmodel.cn/paas/v4, model=glm-4
  openai:
    api-key: ${OPENAI_API_KEY:dummy}
    base-url: ${OPENAI_BASE_URL:https://api.deepseek.com/v1}
    chat:
      # 禁用自动配置！由 SpringAiConfig 手动创建 ChatModel Bean
      enabled: false
      options:
        model: ${OPENAI_MODEL:deepseek-chat}
        temperature: ${OPENAI_TEMPERATURE:0.7}

  # Spring AI Anthropic 模型配置（可选）
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:dummy}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    chat:
      enabled: false
      options:
        model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
        temperature: ${ANTHROPIC_TEMPERATURE:0.7}
        max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}

  # Spring AI MiniMax 模型配置（可选，provider=minimax 时启用）
  minimax:
    api-key: ${MINIMAX_API_KEY:dummy}
    base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com}
    chat:
      enabled: false
      options:
        model: ${MINIMAX_MODEL:MiniMax-M2.7}
        temperature: ${MINIMAX_TEMPERATURE:0.7}

  # Spring AI Chat Memory JDBC 配置
  # 自动创建 spring_ai_chat_memory 表
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: postgresql

# ============================================
# 自定义 LLM 提供者开关
# ============================================
app:
  llm:
    provider: ${LLM_PROVIDER:openai}
  # 多模型路由配置（experimental）
  multi-model:
    enabled: ${MULTI_MODEL_ENABLED:false}
    fallback-chain: ${MULTI_MODEL_FALLBACK_CHAIN:openai,minimax}

# ============================================
# 嵌入模型配置（独立于 Chat provider，始终生效）
# ============================================
rag:
  embedding:
    api-key: ${SILICONFLOW_API_KEY:}
    base-url: ${SILICONFLOW_URL:https://api.siliconflow.cn/v1}
    model: ${SILICONFLOW_MODEL:BAAI/bge-m3}
    dimensions: ${SILICONFLOW_DIMENSIONS:1024}

  # RAG 检索配置
  retrieval:
    vector-weight: 0.5
    fulltext-weight: 0.5
    default-limit: 10
    min-score: 0.3

  # 查询改写配置
  query-rewrite:
    enabled: true
    padding-count: 2

  # 重排序配置
  rerank:
    enabled: false
    diversity-weight: 0.2

  # 文档分块配置
  chunk:
    default-chunk-size: 1000
    default-chunk-overlap: 100

  # 对话记忆配置
  memory:
    max-messages: 20

  # 异步线程池配置
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 100

  # LLM 熔断器配置（默认禁用）
  # 启用后可防止 LLM API 故障时请求堆积
  # circuit-breaker:
  #   enabled: true
  #   failure-rate-threshold: 50      # 失败率阈值（%），超过则熔断
  #   minimum-number-of-calls: 10     # 滑动窗口内最小调用数
  #   wait-duration-in-open-state: 30 # OPEN 状态持续秒数
  #   sliding-window-size: 20         # 滑动窗口大小

# ============================================
# 服务器配置
# ============================================
server:
  port: 8081
  tomcat:
    protocol-handler: NIO

# ============================================
# 日志配置
# ============================================
logging:
  level:
    com.springairag: INFO
    org.springframework.ai: INFO

# ============================================
# Actuator 端点配置
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
          show-details: always
        readiness:
          include: readinessState,db
          show-details: always
  health:
    defaults:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: spring-ai-rag
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
