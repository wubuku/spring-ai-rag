# ============================================
# Spring AI RAG Service Configuration
# ============================================

spring:
  application:
    name: spring-ai-rag

  # Enable Virtual Threads (Java 21+)
  # Virtual threads: dramatically reduced memory footprint, higher concurrency, no pooling needed
  threads:
    virtual:
      enabled: true

  # Allow bean definition overriding (custom config beans override auto-config)
  main:
    allow-bean-definition-overriding: true

  # Exclude unwanted auto-configurations
  # PgVectorStore: manually created by VectorStoreConfig
  # MiniMax Chat/Embedding: manually managed by SpringAiConfig / EmbeddingModelConfig (avoid conflict with SiliconFlow)
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxChatAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxEmbeddingAutoConfiguration

  # File upload configuration (20MB max per file)
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  # DataSource + HikariCP connection pool tuning
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:spring_ai_rag_dev}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 300000              # Idle connections evicted after 5 minutes
      max-lifetime: 1800000             # Connection max lifetime 30 minutes
      connection-timeout: 10000         # Connection acquisition timeout 10 seconds
      validation-timeout: 5000          # Connection validation timeout 5 seconds
      initialization-fail-timeout: 10000 # Fail fast: abort startup if pool init fails within 10s
      leak-detection-threshold: 60000   # Leak detection after 60 seconds
      pool-name: rag-hikari
      register-mbeans: true             # JMX MBean registration for HikariCP pool (JConsole/VisualVM)
      auto-commit: true                 # Explicit auto-commit (PostgreSQL default)
      metrics:
        enable: true                    # Enable HikariCP metrics for Micrometer
      data-source-properties:
        # PostgreSQL prepared statement cache: reuse query execution plans for repeated queries
        prepareThreshold: 5             # Use server-prepared statements after 5 repeated uses
        cachePrepStmts: true            # Enable prepared statement cache (default: false)
        prepStmtCacheSize: 250          # Number of cached prepared statements per connection
        prepStmtCacheSqlLimit: 256      # Max SQL length cached (chars) before eviction

  # JPA / Hibernate configuration (Flyway manages schema, Hibernate does not modify DDL)
  jpa:
    hibernate:
      ddl-auto: validate   # Validate DB schema against entity mappings at startup. FAIL fast if columns missing.
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        # Enable Hibernate query statistics for slow query monitoring.
        # Warning: has a minor performance impact (~5%) in production.
        generate_statistics: false

  # Flyway database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair: true

  # Spring AI OpenAI / OpenAI-compatible model configuration
  # DeepSeek example: base-url=https://api.deepseek.com/v1, model=deepseek-chat
  # Zhipu example: base-url=https://open.bigmodel.cn/paas/v4, model=glm-4
  openai:
    api-key: ${SPRING_AI_OPENAI_API_KEY:${OPENAI_API_KEY:dummy}}
    # ⚠️ IMPORTANT: Spring AI OpenAiApi automatically appends /v1/chat/completions
    # base-url must NOT include /v1, otherwise results in duplicate path /v1/v1 → 401/404
    # Ref: https://github.com/spring-projects/spring-ai/issues/710
    base-url: ${SPRING_AI_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.siliconflow.cn}}
    chat:
      # DISABLED — ChatModel beans are manually created by SpringAiConfig
      enabled: false
      options:
        model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:${OPENAI_MODEL:Qwen/Qwen2.5-7B-Instruct}}
        temperature: ${OPENAI_TEMPERATURE:0.7}

  # Spring AI Anthropic model configuration (optional)
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:dummy}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    chat:
      enabled: false
      options:
        model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
        temperature: ${ANTHROPIC_TEMPERATURE:0.7}
        max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}

  # Spring AI MiniMax model configuration (optional, enabled when provider=minimax)
  # ⚠️ IMPORTANT: base-url must NOT include /v1, Spring AI MiniMaxApi automatically appends /v1/chat/completions
  minimax:
    api-key: ${MINIMAX_API_KEY:dummy}
    base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com}
    chat:
      enabled: false
      options:
        model: ${MINIMAX_MODEL:MiniMax-M2.7}
        temperature: ${MINIMAX_TEMPERATURE:0.7}

  # Spring AI Chat Memory JDBC configuration
  # Automatically creates spring_ai_chat_memory table
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: postgresql

# ============================================
# Custom LLM Provider Switch
# ============================================
app:
  llm:
    provider: ${LLM_PROVIDER:openai}

  # Multi-model configuration (models.json external config overrides this when present)
  models:
    # 外部 JSON 配置文件路径。当此文件存在时，完全覆盖下方 YAML 配置。
    config-file: ${MODELS_CONFIG_FILE:}

    providers:
      openrouter:
        displayName: OpenRouter
        baseUrl: https://openrouter.ai/api/v1
        apiKey: ${OPENROUTER_API_KEY:}
        apiType: openai-completions
        enabled: true
        priority: 1
        models:
          - id: xiaomi/mimo-v2-pro
            name: MiMo V2 Pro
            type: chat
            reasoning: false
            inputModalities: [text]
            cost:
              input: 0
              output: 0
              cacheRead: 0
              cacheWrite: 0
            contextWindow: 600000
            maxTokens: 32000

      minimax:
        displayName: MiniMax
        baseUrl: https://api.minimaxi.com/anthropic
        apiKey: ${MINIMAX_API_KEY:}
        apiType: anthropic-messages
        enabled: true
        priority: 2
        models:
          - id: MiniMax-M2.7
            name: MiniMax M2.7
            type: chat
            reasoning: false
            inputModalities: [text]
            cost:
              input: 15
              output: 60
              cacheRead: 2
              cacheWrite: 10
            contextWindow: 200000
            maxTokens: 8192
          - id: embo-01
            name: Embedding V01
            type: embedding
            inputModalities: [text]
            dimension: 1024
            cost:
              input: 0
              output: 0

      siliconflow:
        displayName: SiliconFlow
        baseUrl: https://api.siliconflow.cn
        apiKey: ${SILICONFLOW_API_KEY:}
        apiType: openai-chat
        enabled: true
        priority: 5
        models:
          - id: BGE-M3
            name: BGE-M3 Embedding
            type: embedding
            inputModalities: [text]
            dimension: 1024
            cost:
              input: 0
              output: 0

      zhipu:
        displayName: 智谱 GLM-5
        baseUrl: https://open.bigmodel.cn/api/anthropic
        apiKey: ${ZHIPU_API_KEY:}
        apiType: anthropic-messages
        enabled: true
        priority: 3
        models:
          - id: GLM-5
            name: GLM-5
            type: chat
            reasoning: true
            inputModalities: [text]
            cost:
              input: 5
              output: 15
              cacheRead: 0
              cacheWrite: 0
            contextWindow: 131072
            maxTokens: 8192

    chatModel:
      primary: minimax/MiniMax-M2.7
      fallbacks:
        - openrouter/xiaomi/mimo-v2-pro
        - zhipu/GLM-5

    embeddingModel:
      primary: siliconflow/BGE-M3
      fallbacks:
        - minimax/embo-01

# ============================================
# Embedding Model Configuration (independent of Chat provider, always active)
# ============================================
rag:
  embedding:
    api-key: ${SILICONFLOW_API_KEY:}
    # ⚠️ IMPORTANT: Spring AI OpenAiEmbeddingModel automatically appends /v1/embeddings
    # base-url must NOT include /v1, otherwise results in duplicate path /v1/v1 → 404
    base-url: ${SILICONFLOW_URL:https://api.siliconflow.cn}
    model: ${SILICONFLOW_MODEL:BAAI/bge-m3}
    dimensions: ${SILICONFLOW_DIMENSIONS:1024}

  # RAG retrieval configuration
  retrieval:
    vector-weight: 0.5
    fulltext-weight: 0.5
    default-limit: 10
    min-score: 0.3
    # K value for precision@k and recall@k metrics
    evaluation-k: 10
    # Timeout in seconds for LLM-based answer quality evaluation
    answer-quality-timeout-seconds: 30

  # Query rewriting configuration
  query-rewrite:
    enabled: true
    padding-count: 2

  # Re-ranking configuration
  rerank:
    enabled: false
    diversity-weight: 0.2

  # Document chunking configuration
  chunk:
    default-chunk-size: 1000
    default-chunk-overlap: 100

  # Chat memory configuration
  memory:
    max-messages: 20
    message-ttl-days: 30        # 0=never expire, >0=records older than N days are purged
    cleanup-cron: "0 0 3 * * *" # Daily at 3:00 AM (Asia/Shanghai timezone)

  # Async thread pool configuration
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 100

  # Per-endpoint LLM API timeout configuration (milliseconds)
  # Applied at the RestClient level for OpenAI/Anthropic/MiniMax API calls
  timeout:
    connect-timeout-ms: 10000    # Connection establishment timeout
    read-timeout-ms: 60000       # Read timeout (time waiting for first byte)
    chat-ask-ms: 120000          # Non-streaming chat endpoint timeout
    chat-stream-ms: 180000       # Streaming chat endpoint timeout (longer for token gen)
    search-ms: 30000             # Search endpoint timeout
    embed-ms: 60000              # Embedding endpoint timeout
    model-compare-ms: 90000      # Per-model comparison timeout

  # SSE (Server-Sent Events) streaming configuration
  sse:
    heartbeat-interval-seconds: 30  # Heartbeat interval in seconds (0=disabled).
                                    # Proxies may close idle connections after ~60s, so 30s recommended.
                                    # Set to 0 to disable heartbeat.

  # PDF import configuration
  # Requires marker-pdf (marker_single CLI) to be installed on the host.
  # Installation: pip install marker-pdf  (or: brew install marker-pdf on macOS)
  pdf:
    enabled: true
    marker-cli: ${RAG_PDF_MARKER_CLI:marker_single}  # Path to marker_single executable
    langs: ${RAG_PDF_LANGS:zh}                       # Language hint for PDF OCR (comma-separated, e.g., "zh,en")
    output-base-dir: ${RAG_PDF_OUTPUT_DIR:/tmp/spring-ai-rag/pdf-imports}  # Temp working directory
    extra-args: ${RAG_PDF_EXTRA_ARGS:}               # Additional CLI args (e.g., "--no-markdown-template")

  # HTTP proxy configuration for LLM API calls
  # By default, proxy is disabled (enabled: false) to avoid dev environment interference
  # Set enabled: true and configure host/port when running behind a corporate proxy
  # proxy:
  #   enabled: true
  #   host: 127.0.0.1
  #   port: 7890
  #   no-proxy-hosts: localhost|127.0.0.1|*.internal

  # LLM circuit breaker configuration (disabled by default)
  # When enabled, prevents request pile-up during LLM API outages
  # circuit-breaker:
  #   enabled: true
  #   failure-rate-threshold: 50      # Failure rate threshold (%), trip when exceeded
  #   minimum-number-of-calls: 10     # Min calls in sliding window
  #   wait-duration-in-open-state: 30 # Seconds to stay in OPEN state
  #   sliding-window-size: 20         # Sliding window size
  # embedding-circuit-breaker:
  #   enabled: true
  #   failure-rate-threshold: 50      # Failure rate threshold (%), trip when exceeded
  #   minimum-number-of-calls: 10     # Min calls in sliding window
  #   wait-duration-in-open-state: 30 # Seconds to stay in OPEN state
  #   sliding-window-size: 20         # Sliding window size

  # Alert SLO thresholds (can be overridden in application.yml)
  # These values are used by AlertService.checkAllSlos() to determine SLO compliance
  alert:
    availability-slo: 99.9          # Availability SLO threshold (percentage)
    latency-p50-slo-ms: 500        # P50 latency SLO threshold (milliseconds)
    latency-p95-slo-ms: 2000       # P95 latency SLO threshold (milliseconds)
    latency-p99-slo-ms: 5000       # P99 latency SLO threshold (milliseconds)
    mrr-slo: 0.6                  # Mean Reciprocal Rank (MRR) quality SLO threshold
    hit-rate-slo: 0.85             # Embedding cache hit rate SLO threshold

  # CORS configuration — enable for WebUI development
  cors:
    enabled: true
    allowed-origins:
      - "http://localhost:8081"
      - "http://localhost:3000"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    max-age: 3600

  # LLM API retry configuration
  # Retry with exponential backoff for transient failures (timeouts, 429, 503)
  # Note: streaming (SSE) responses cannot be retried — only non-streaming calls
  retry:
    enabled: true
    max-attempts: 3              # Total attempts (1 = disabled)
    initial-backoff-ms: 1000     # Initial backoff delay
    max-backoff-ms: 10000        # Maximum backoff cap
    backoff-multiplier: 2.0      # Exponential multiplier
    retry-on-rate-limit: true    # Retry on HTTP 429
    retry-on-service-unavailable: true  # Retry on HTTP 503
    retry-on-connect-timeout: true
    retry-on-read-timeout: true
    jitter-factor: 0.2          # Random jitter factor (0.0 to 1.0)

  # Slow query monitoring configuration
  # Requires hibernate.generate_statistics=true (see spring.jpa.properties above)
  # Warning: enabling statistics has a minor performance impact (~5%)
  # slow-query:
  #   enabled: true
  #   threshold-ms: 1000           # Queries exceeding this (ms) are logged and counted
  #   log-enabled: true             # Log slow queries to application log
  #   max-retained: 100             # Max recent slow queries to retain for REST exposure

  # Alert notification channels (disabled by default)
  # When enabled, fired alerts are sent to configured channels asynchronously
  # notifications:
  #   enabled: true
  #   dingtalk:
  #     - name: default
  #       webhook-url: https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN
  #       secret: SEC...            # Optional: DingTalk加签密钥 (机器人安全设置)
  #       alert-types:              # Only notify for these alert types
  #         - THRESHOLD_HIGH
  #         - SLO_BREACH
  #         - AVAILABILITY
  #   email:
  #     enabled: false
  #     host: smtp.example.com
  #     port: 587
  #     username: alerts@example.com
  #     password: secret
  #     from: rag-alerts@example.com
  #     to:
  #       - admin@example.com
  #     alert-types:
  #       - CRITICAL
  #       - SLO_BREACH

# ============================================
# Server Configuration
# ============================================
server:
  port: 8081
  tomcat:
    protocol-handler: NIO
  # Gzip compression for API responses
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,text/javascript
    min-response-size: 1024  # compress responses >= 1KB

# ============================================
# Logging Configuration
# ============================================
logging:
  level:
    com.springairag: INFO
    org.springframework.ai: INFO

# ============================================
# Actuator Endpoint Configuration
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
          show-details: always
        readiness:
          include: readinessState,db
          show-details: always
  health:
    defaults:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: spring-ai-rag
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

# ============================================
# SpringDoc OpenAPI / Swagger UI Configuration
# ============================================
springdoc:
  # Swagger UI settings
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    display-operation-id: false
    show-extensions: true
    try-it-out-enabled: true  # Enable "Try it out" for all operations
    filter: false
    maxDisplayedTags: 100
    with-credentials: false
    settings:
      # Deep linking: URL reflects operation selected in Try-it-Out
      deep-linking: true
      # Show request/response examples in addition to schemas
      show-request-duration: true
      default-models-expand-depth: 2
      default-model-expand-depth: 2
  # OpenAPI 3 spec generation settings
  api-docs:
    enabled: true
    path: /v3/api-docs
    auto-generate-collection-schema: false
  # Group operations by tag instead of path
  show-actuator: false
