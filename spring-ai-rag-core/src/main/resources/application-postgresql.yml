# ============================================
# PostgreSQL Profile 配置
# 激活方式：--spring.profiles.active=postgresql
# 作用：重新启用 PgVectorStore 自动配置（覆盖主配置的 exclude）
# ============================================

spring:
  autoconfigure:
    exclude:

# 启用 pgvector 向量存储
  ai:
    vectorstore:
      pgvector:
        enabled: true
        vector-table-name: rag_vector_store
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        dimensions: 1024
