name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: spring_ai_rag_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LLM_PROVIDER: openai
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: spring_ai_rag_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/spring_ai_rag_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-key' }}
      OPENAI_BASE_URL: https://api.minimaxi.com
      OPENAI_MODEL: MiniMax-M2.7
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY || 'test-key' }}
      SILICONFLOW_BASE_URL: https://api.siliconflow.cn
      SILICONFLOW_EMBEDDING_MODEL: BAAI/bge-m3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Create test database and extensions
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE spring_ai_rag_test" 2>/dev/null || true
          psql -h localhost -U postgres -d spring_ai_rag_test -c "CREATE EXTENSION IF NOT EXISTS vector"
          psql -h localhost -U postgres -d spring_ai_rag_test -c "CREATE EXTENSION IF NOT EXISTS pg_jieba"

      - name: Install modules (skip tests, install to local Maven repo)
        run: mvn install -DskipTests -B -q

      - name: Build & Test with JaCoCo
        run: mvn test -B

      - name: Flyway migration consistency check
        run: |
          echo "## Flyway Migration Status" >> $GITHUB_STEP_SUMMARY
          # Count migration scripts in the codebase
          MIGRATION_COUNT=$(find spring-ai-rag-core/src/main/resources/db/migration -name "V*.sql" | wc -l | tr -d ' ')
          echo "Migration scripts in codebase: $MIGRATION_COUNT" | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```sql' >> $GITHUB_STEP_SUMMARY
          # Show Flyway migration history (Flyway ran during mvn test via Spring Boot auto-config)
          psql -h localhost -U postgres -d spring_ai_rag_test -c "SELECT version, description, type, installed_on, state FROM flyway_schema_history ORDER BY installed_rank;" 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Verify all migrations applied: installed_count must equal script count
          INSTALLED_COUNT=$(psql -h localhost -U postgres -d spring_ai_rag_test -t -c "SELECT COUNT(*) FROM flyway_schema_history WHERE type='SQL' AND state='Success';" | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$INSTALLED_COUNT" != "$MIGRATION_COUNT" ]; then
            echo "❌ MIGRATION DRIFT DETECTED: $INSTALLED_COUNT applied, but $MIGRATION_COUNT scripts exist" | tee -a $GITHUB_STEP_SUMMARY
            echo "Pending or failed migrations found. Ensure all Flyway scripts are applied." | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Flyway migration consistency verified: $INSTALLED_COUNT/$MIGRATION_COUNT migrations applied" | tee -a $GITHUB_STEP_SUMMARY
          fi
          # Check for failed migrations
          FAILED_COUNT=$(psql -h localhost -U postgres -d spring_ai_rag_test -t -c "SELECT COUNT(*) FROM flyway_schema_history WHERE state='Failed';" | tr -d ' ')
          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "❌ Failed migrations found in database" | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Package
        run: mvn package -DskipTests -B

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          flags: 'maven,jacoco'
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          echo "## JaCoCo Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          for report in spring-ai-rag-*/target/site/jacoco/index.html; do
            if [ -f "$report" ]; then
              module=$(echo "$report" | cut -d/ -f1)
              echo "| $module | ✅ Report generated |" >> $GITHUB_STEP_SUMMARY
            fi
          done
